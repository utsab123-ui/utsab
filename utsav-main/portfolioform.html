<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .container {
        height: 100vh;
        width: 100%;
        background-color: blue;
        display: flex;
        justify-content: center;
        align-items: center;

    }

    label {
        color: white;
        font-size: larger;
        font-weight: 200;


    }

    .a input {
        margin-left: 55px;

    }

    .a {
        margin-top: 50px;
    }

    button {
        margin-left: 100px;
        padding: 5px;

    }

    button:hover {
        background-color: plum;
    }

    .box {
        height: 200px;
        width: 20%;
        background-color: brown;


    }
</style>

<body>
    <div class="container">
        <div class="box">
            <form action="">
                <div class="a">
                    <label for="">ID</label>
                    <input type="text" name="id" placeholder="Enter your id" id="id"> <br><br>
                </div>

                <label for="">Password</label>
                <input type="password" password="password" placeholder=" Enter your password" id="password"><br><br>

                <button id="btn">sign up</button>


        </div>



        </form>
    </div>

    <script src="portfolio.js"></script>
    <script src="portfoliologin.js"></script>
</body>

</html>
